<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotmello Productions - Admin HQ</title>
    
    <meta name="theme-color" content="#020617">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- QR Code Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #020617; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
        .glass-card { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="text-slate-100 flex h-screen overflow-hidden">

    <!-- Mobile Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/70 z-40 hidden md:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="adminSidebar" class="fixed inset-y-0 left-0 transform -translate-x-full md:relative md:translate-x-0 transition duration-300 ease-in-out z-50 w-64 bg-slate-900 border-r border-slate-800 flex flex-col shadow-2xl md:shadow-none">
        <div class="p-6 border-b border-slate-800 flex items-center justify-between">
            <img src="logo.png" alt="Hotmello Productions" class="h-8 object-contain drop-shadow-[0_0_8px_rgba(249,115,22,0.4)]" onerror="this.outerHTML='<h1 class=\'font-black text-orange-500 text-xl tracking-widest\'>HOTMELLO</h1>'">
            <button onclick="toggleSidebar()" class="md:hidden text-slate-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
        </div>
        <nav class="flex-1 p-4 space-y-2 mt-4 overflow-y-auto">
            <button onclick="switchAdminView('dashboardView')" id="nav-dashboard" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl bg-orange-600/10 text-orange-500 font-bold transition">
                <i class="fas fa-chart-pie w-5"></i> Dashboard
            </button>
            <button onclick="switchAdminView('eventsView')" id="nav-events" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-slate-400 font-bold transition hover:bg-slate-800 hover:text-white">
                <i class="fas fa-calendar-alt w-5"></i> Events Mgmt
            </button>
            <button onclick="switchAdminView('crewView')" id="nav-crew" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-slate-400 font-bold transition hover:bg-slate-800 hover:text-white">
                <i class="fas fa-users w-5"></i> Crew & Payroll
            </button>
            <button onclick="switchAdminView('inventoryView')" id="nav-inventory" class="w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-slate-400 font-bold transition hover:bg-slate-800 hover:text-white">
                <i class="fas fa-qrcode w-5"></i> QR Inventory
            </button>
        </nav>
        <div class="p-4 border-t border-slate-800 text-center">
            <p class="text-[10px] text-slate-500 uppercase tracking-widest font-bold">System Status: Online</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden bg-[#020617] relative">
        <!-- Abstract Background -->
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-3xl h-64 bg-orange-600/5 rounded-full blur-[100px] pointer-events-none"></div>

        <!-- Topbar -->
        <header class="bg-slate-900/40 backdrop-blur-md border-b border-slate-800/50 p-4 lg:p-5 flex justify-between items-center z-10 sticky top-0">
            <div class="flex items-center gap-3">
                <button onclick="toggleSidebar()" class="md:hidden text-slate-300 hover:text-white p-1"><i class="fas fa-bars text-xl"></i></button>
                <h2 id="topBarTitle" class="text-lg lg:text-xl font-bold text-white tracking-wide">Overview</h2>
            </div>
            <div id="topBarActions"></div>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-4 lg:p-8 relative z-10 scroll-smooth">
            
            <!-- Dashboard View -->
            <div id="dashboardView" class="space-y-6 animate-fade-in">
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="flex justify-between items-start">
                            <div><p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Total Events</p><h3 id="statEvents" class="text-3xl font-black text-white mt-1">--</h3></div>
                            <div class="w-10 h-10 rounded-xl bg-orange-500/10 flex items-center justify-center text-orange-500"><i class="fas fa-calendar-check text-lg"></i></div>
                        </div>
                    </div>
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="flex justify-between items-start">
                            <div><p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Hours Logged</p><h3 id="statHours" class="text-3xl font-black text-white mt-1">--</h3></div>
                            <div class="w-10 h-10 rounded-xl bg-emerald-500/10 flex items-center justify-center text-emerald-500"><i class="fas fa-clock text-lg"></i></div>
                        </div>
                    </div>
                    <div class="glass-card p-6 rounded-2xl">
                        <div class="flex justify-between items-start">
                            <div><p class="text-xs text-slate-400 font-bold uppercase tracking-widest">Active Crew</p><h3 id="statCrew" class="text-3xl font-black text-white mt-1">--</h3></div>
                            <div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center text-blue-500"><i class="fas fa-users text-lg"></i></div>
                        </div>
                    </div>
                </div>
                
                <div class="glass-card p-6 rounded-2xl mt-8">
                    <h3 class="text-sm font-bold text-slate-300 uppercase tracking-widest mb-4">Recent Shift Logs</h3>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left text-sm text-slate-400 whitespace-nowrap">
                            <thead class="text-xs uppercase bg-slate-800/50 text-slate-300">
                                <tr><th class="px-4 py-3 rounded-l-lg">Crew</th><th class="px-4 py-3">Event</th><th class="px-4 py-3">Hours</th><th class="px-4 py-3 rounded-r-lg">Status</th></tr>
                            </thead>
                            <tbody id="dashLogsTable"><tr><td colspan="4" class="px-4 py-4 text-center">Loading...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Events List View -->
            <div id="eventsView" class="hidden space-y-6 animate-fade-in">
                <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6" id="eventsGrid"></div>
            </div>

            <!-- Single Event Details View -->
            <div id="eventDetailsView" class="hidden space-y-6 animate-fade-in">
                <button onclick="switchAdminView('eventsView')" class="text-slate-400 hover:text-white flex items-center gap-2 mb-2 transition text-sm font-medium">
                    <i class="fas fa-arrow-left"></i> All Events
                </button>
                
                <div class="glass-card rounded-3xl p-6 lg:p-8 relative overflow-hidden flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-orange-600/10 rounded-full blur-3xl pointer-events-none"></div>
                    <div class="relative z-10">
                        <h2 id="detailEventName" class="text-2xl md:text-3xl font-black text-white tracking-wide mb-2">Event Name</h2>
                        <p id="detailEventLocation" class="text-slate-400 font-medium"><i class="fas fa-map-marker-alt mr-2 text-orange-500/80"></i>Location</p>
                        <div class="mt-4 flex flex-wrap gap-2" id="detailEventCrew"></div>
                    </div>
                </div>

                <!-- Missing Gear Reports -->
                <div class="glass-card rounded-2xl p-6 border border-rose-500/20">
                    <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2 border-b border-slate-800 pb-3">
                        <i class="fas fa-exclamation-triangle text-rose-500"></i> Missing Gear Reports
                    </h3>
                    <div id="eventMissingList" class="space-y-3"></div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass-card rounded-2xl p-6">
                        <h3 class="text-lg font-bold text-white mb-4 flex items-center gap-2 border-b border-slate-800 pb-3"><i class="fas fa-clock text-emerald-500"></i> Shift Records</h3>
                        <div id="eventShiftsList" class="space-y-3"></div>
                    </div>

                    <div class="glass-card rounded-2xl p-6">
                        <div class="flex justify-between items-center mb-4 border-b border-slate-800 pb-3">
                            <h3 class="text-lg font-bold text-white flex items-center gap-2"><i class="fas fa-tasks text-amber-500"></i> Deliverables</h3>
                            <button onclick="openModal('addTaskModal')" class="bg-orange-600/20 text-orange-500 hover:bg-orange-600 hover:text-white px-3 py-1.5 rounded-lg text-xs font-bold transition whitespace-nowrap">
                                + Assign Task
                            </button>
                        </div>
                        <div id="eventTasksList" class="space-y-4"></div>
                    </div>
                </div>
            </div>

            <!-- Crew Management View -->
            <div id="crewView" class="hidden space-y-6 animate-fade-in">
                <div class="glass-card p-6 rounded-2xl">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="crewGrid"></div>
                </div>
            </div>

            <!-- Inventory Management View -->
            <div id="inventoryView" class="hidden space-y-6 animate-fade-in">
                <div class="glass-card p-6 rounded-2xl">
                    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4" id="inventoryGrid"></div>
                </div>
            </div>

        </div>
    </main>

    <!-- Modals -->
    <!-- Add Event -->
    <div id="addEventModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center">
                <h3 class="text-lg font-bold text-white tracking-wide">Create New Event</h3>
                <button onclick="closeModal('addEventModal')" class="text-slate-500 hover:text-white"><i class="fas fa-times text-xl"></i></button>
            </div>
            <div class="p-6 space-y-5 overflow-y-auto">
                <div>
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1.5 block">Event Title</label>
                    <input type="text" id="newEventName" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white focus:border-orange-500 outline-none transition">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1.5 block">Location Venue</label>
                    <input type="text" id="newEventLocation" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white focus:border-orange-500 outline-none transition">
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1.5 block">Assign Crew</label>
                    <div id="crewSelectionDiv" class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-32 overflow-y-auto bg-slate-950 border border-slate-800 p-3 rounded-xl"></div>
                </div>
                <div>
                    <label class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1.5 block">Assign Gear/Equipment</label>
                    <div id="equipmentSelectionDiv" class="grid grid-cols-1 sm:grid-cols-2 gap-2 max-h-40 overflow-y-auto bg-slate-950 border border-slate-800 p-3 rounded-xl"></div>
                </div>
            </div>
            <div class="p-5 border-t border-slate-800 bg-slate-900/50">
                <button onclick="saveEvent()" id="btnSaveEvent" class="w-full bg-orange-600 hover:bg-orange-500 text-white py-3.5 rounded-xl font-bold transition shadow-lg tracking-wide">
                    Create Event
                </button>
            </div>
        </div>
    </div>

    <!-- Add Task -->
    <div id="addTaskModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center"><h3 class="text-lg font-bold text-white">Assign Task</h3><button onclick="closeModal('addTaskModal')" class="text-slate-500 hover:text-white"><i class="fas fa-times"></i></button></div>
            <div class="p-6 space-y-4">
                <div><label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Title</label><input type="text" id="newTaskTitle" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-orange-500"></div>
                <div><label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Details</label><textarea id="newTaskDesc" rows="3" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-orange-500"></textarea></div>
                <button onclick="saveTask()" class="w-full bg-orange-600 text-white py-3 rounded-xl font-bold mt-2 hover:bg-orange-500">Add Task</button>
            </div>
        </div>
    </div>
    
    <!-- Add Crew -->
    <div id="addCrewModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center"><h3 class="text-lg font-bold text-white">Add Crew Member</h3><button onclick="closeModal('addCrewModal')" class="text-slate-500 hover:text-white"><i class="fas fa-times"></i></button></div>
            <div class="p-6 space-y-4">
                <div><label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Name</label><input type="text" id="newCrewName" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-blue-500"></div>
                <div><label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Primary Role (e.g. Photographer)</label><input type="text" id="newCrewRole" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-blue-500"></div>
                <button onclick="saveCrew()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold mt-2 hover:bg-blue-500">Save Crew</button>
            </div>
        </div>
    </div>

    <!-- Add Inventory -->
    <div id="addInventoryModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md shadow-2xl overflow-hidden">
            <div class="p-5 border-b border-slate-800 flex justify-between items-center"><h3 class="text-lg font-bold text-white">Add Gear Item</h3><button onclick="closeModal('addInventoryModal')" class="text-slate-500 hover:text-white"><i class="fas fa-times"></i></button></div>
            <div class="p-6 space-y-4">
                <div><label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Item Name / Model</label><input type="text" id="newInvName" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-emerald-500"></div>
                <div><label class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Serial / ID Tag</label><input type="text" id="newInvTag" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-white outline-none focus:border-emerald-500"></div>
                <button onclick="saveInventory()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold mt-2 hover:bg-emerald-500">Save Item & Generate QR</button>
            </div>
        </div>
    </div>

    <!-- Image Viewer -->
    <div id="imageViewerModal" class="hidden fixed inset-0 bg-black/95 z-[110] flex flex-col items-center justify-center p-4">
        <button onclick="closeModal('imageViewerModal')" class="absolute top-6 right-6 text-white text-3xl hover:text-rose-500 transition"><i class="fas fa-times"></i></button>
        <img id="viewerImage" src="" class="max-w-full max-h-[80vh] object-contain rounded-lg shadow-[0_0_30px_rgba(0,0,0,0.8)] border border-slate-800">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, updateDoc, doc, onSnapshot, serverTimestamp, query, orderBy, limit, where } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAuPT3k3JPOPx2jMYelNAEKietV-OVAWOI",
            authDomain: "hotmellow-labs.firebaseapp.com",
            projectId: "hotmellow-labs",
            storageBucket: "hotmellow-labs.firebasestorage.app",
            messagingSenderId: "435268267101",
            appId: "1:435268267101:web:e8aefe8f7f20750dc831b4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let activeEventId = null;
        let globalCrewList = [];
        let globalInventoryList = [];

        // UI & Sidebar Routing
        window.toggleSidebar = () => {
            const sidebar = document.getElementById('adminSidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        window.switchAdminView = (viewId) => {
            ['dashboardView', 'eventsView', 'eventDetailsView', 'crewView', 'inventoryView'].forEach(v => {
                const el = document.getElementById(v);
                if (el) el.classList.add('hidden');
            });
            
            ['dashboard', 'events', 'crew', 'inventory'].forEach(v => {
                const btn = document.getElementById(`nav-${v}`);
                if (btn) btn.className = "w-full flex items-center gap-3 px-4 py-3.5 rounded-xl text-slate-400 font-bold transition hover:bg-slate-800 hover:text-white";
            });

            const targetView = document.getElementById(viewId);
            if (targetView) targetView.classList.remove('hidden');
            
            let activeNav = viewId.replace('View', '');
            if(activeNav === 'eventDetails') activeNav = 'events';
            
            const navBtn = document.getElementById(`nav-${activeNav}`);
            if (navBtn) {
                const colors = { 'dashboard': 'orange', 'events': 'orange', 'crew': 'blue', 'inventory': 'emerald' };
                const c = colors[activeNav];
                navBtn.className = `w-full flex items-center gap-3 px-4 py-3.5 rounded-xl bg-${c}-600/10 text-${c}-500 font-bold transition`;
            }

            const titles = { 'dashboardView': 'System Overview', 'eventsView': 'Events Management', 'crewView': 'Crew Directory', 'inventoryView': 'QR Gear Inventory' };
            if (titles[viewId]) document.getElementById('topBarTitle').innerText = titles[viewId];

            const topActions = document.getElementById('topBarActions');
            if (topActions) {
                topActions.innerHTML = "";
                if(viewId === 'eventsView') topActions.innerHTML = `<button onclick="prepareEventModal()" class="bg-orange-600 hover:bg-orange-500 text-white px-3 md:px-4 py-2 rounded-lg font-bold text-xs md:text-sm shadow-lg flex items-center gap-2 whitespace-nowrap"><i class="fas fa-plus"></i> New Event</button>`;
                if(viewId === 'crewView') topActions.innerHTML = `<button onclick="openModal('addCrewModal')" class="bg-blue-600 hover:bg-blue-500 text-white px-3 md:px-4 py-2 rounded-lg font-bold text-xs md:text-sm shadow-lg flex items-center gap-2 whitespace-nowrap"><i class="fas fa-user-plus"></i> Add Crew</button>`;
                if(viewId === 'inventoryView') topActions.innerHTML = `<button onclick="openModal('addInventoryModal')" class="bg-emerald-600 hover:bg-emerald-500 text-white px-3 md:px-4 py-2 rounded-lg font-bold text-xs md:text-sm shadow-lg flex items-center gap-2 whitespace-nowrap"><i class="fas fa-qrcode"></i> New Gear</button>`;
            }

            // Hide sidebar on mobile after clicking a link
            if(window.innerWidth < 768 && !document.getElementById('adminSidebar').classList.contains('-translate-x-full')) {
                toggleSidebar();
            }

            if(viewId === 'dashboardView') loadDashboard();
            if(viewId === 'eventsView') loadEvents();
            if(viewId === 'crewView') loadCrew();
            if(viewId === 'inventoryView') loadInventory();
        };

        window.openModal = (id) => { const el = document.getElementById(id); if (el) el.classList.remove('hidden'); };
        window.closeModal = (id) => {
            const el = document.getElementById(id); if (el) el.classList.add('hidden');
            if(id === 'addEventModal') { document.getElementById('newEventName').value=''; document.getElementById('newEventLocation').value=''; }
            if(id === 'addTaskModal') { document.getElementById('newTaskTitle').value=''; document.getElementById('newTaskDesc').value=''; }
            if(id === 'addInventoryModal') { document.getElementById('newInvName').value=''; document.getElementById('newInvTag').value=''; }
        };
        window.viewImage = (src) => { if(src) { document.getElementById('viewerImage').src = src; openModal('imageViewerModal'); } };

        // --- Core Data Loaders ---
        async function fetchGlobalData() {
            try {
                const cSnap = await getDocs(collection(db, "crew"));
                globalCrewList = []; cSnap.forEach(d => globalCrewList.push({id: d.id, ...d.data()}));
                
                const iSnap = await getDocs(collection(db, "inventory"));
                globalInventoryList = []; iSnap.forEach(d => globalInventoryList.push({id: d.id, ...d.data()}));
            } catch(e) { console.error("Global data fetch err", e); }
        }

        // --- Dashboard ---
        async function loadDashboard() {
            try {
                const eSnap = await getDocs(collection(db, "events"));
                document.getElementById('statEvents').innerText = eSnap.size;
                
                await fetchGlobalData();
                document.getElementById('statCrew').innerText = globalCrewList.length;

                const sSnap = await getDocs(query(collection(db, "shift_logs"), orderBy("timestamp", "desc"), limit(5)));
                let totalH = 0; let logRows = "";
                
                const allLogs = await getDocs(collection(db, "shift_logs"));
                allLogs.forEach(d => totalH += (d.data().hours || 0));
                document.getElementById('statHours').innerText = Math.round(totalH);

                if(sSnap.empty) logRows = `<tr><td colspan="4" class="px-4 py-4 text-center text-slate-500">No logs found</td></tr>`;
                sSnap.forEach(d => {
                    const data = d.data();
                    logRows += `<tr class="border-b border-slate-800/50 hover:bg-slate-800/30 transition">
                        <td class="px-4 py-3 font-medium text-white">${data.crewName}</td>
                        <td class="px-4 py-3 text-slate-400 truncate max-w-[150px]">${data.eventName}</td>
                        <td class="px-4 py-3 text-emerald-400 font-medium">${data.hours}h</td>
                        <td class="px-4 py-3"><span class="text-[10px] uppercase font-bold bg-slate-800 px-2 py-1 rounded">${data.status}</span></td>
                    </tr>`;
                });
                document.getElementById('dashLogsTable').innerHTML = logRows;
            } catch(e) { console.error(e); }
        }

        // --- Events ---
        async function loadEvents() {
            const grid = document.getElementById('eventsGrid'); grid.innerHTML = '<div class="col-span-full text-center py-10 text-slate-500"><i class="fas fa-spinner fa-spin"></i></div>';
            try {
                const snap = await getDocs(query(collection(db, "events"), orderBy("createdAt", "desc")));
                grid.innerHTML = "";
                if(snap.empty) { grid.innerHTML = '<div class="col-span-full text-center text-slate-500 bg-slate-900/50 p-10 rounded-2xl border border-slate-800 border-dashed">No events found.</div>'; return; }
                snap.forEach(d => {
                    const e = {id: d.id, ...d.data()};
                    const card = document.createElement('div');
                    card.className = "glass-card rounded-2xl p-6 hover:border-orange-500/40 transition cursor-pointer group";
                    card.onclick = () => openEventDetails(e);
                    card.innerHTML = `
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-12 h-12 bg-orange-500/10 text-orange-500 rounded-xl flex items-center justify-center text-xl group-hover:bg-orange-500 group-hover:text-white transition"><i class="fas fa-calendar-check"></i></div>
                            <i class="fas fa-chevron-right text-slate-600 group-hover:text-orange-500 transition mt-2"></i>
                        </div>
                        <h3 class="text-xl font-bold text-white mb-1 truncate">${e.name}</h3>
                        <p class="text-sm text-slate-400 mb-5 truncate"><i class="fas fa-map-marker-alt mr-2 opacity-70"></i>${e.location || 'N/A'}</p>
                        <div class="flex gap-2">
                            <span class="bg-slate-800 text-slate-300 text-[10px] font-bold uppercase px-2.5 py-1 rounded-md border border-slate-700"><i class="fas fa-users mr-1"></i> ${e.assignedCrew?e.assignedCrew.length:0}</span>
                            <span class="bg-slate-800 text-slate-300 text-[10px] font-bold uppercase px-2.5 py-1 rounded-md border border-slate-700"><i class="fas fa-qrcode mr-1"></i> ${e.equipment?e.equipment.length:0} Gear</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });
            } catch (err) { console.error(err); grid.innerHTML = `<div class="text-rose-500 col-span-full">Error loading events.</div>`; }
        }

        window.prepareEventModal = async () => {
            await fetchGlobalData();
            const cDiv = document.getElementById('crewSelectionDiv'); cDiv.innerHTML = "";
            globalCrewList.forEach(c => {
                cDiv.innerHTML += `<label class="flex items-center gap-2 p-2 bg-slate-900 rounded border border-slate-800 cursor-pointer hover:border-orange-500 transition"><input type="checkbox" value="${c.name}" class="crew-cb accent-orange-500"><span class="text-xs text-slate-300">${c.name}</span></label>`;
            });
            const iDiv = document.getElementById('equipmentSelectionDiv'); iDiv.innerHTML = "";
            globalInventoryList.forEach(i => {
                // Ensure we save ID and Name for the scanner
                iDiv.innerHTML += `<label class="flex items-center gap-2 p-2 bg-slate-900 rounded border border-slate-800 cursor-pointer hover:border-orange-500 transition"><input type="checkbox" value="${i.id}" data-name="${i.name}" class="eq-cb accent-orange-500"><span class="text-xs text-slate-300 truncate" title="${i.name}">${i.name}</span></label>`;
            });
            openModal('addEventModal');
        };

        window.saveEvent = async () => {
            const name = document.getElementById('newEventName').value, loc = document.getElementById('newEventLocation').value;
            if(!name) return alert("Enter event name.");
            const crewArray = Array.from(document.querySelectorAll('.crew-cb:checked')).map(cb => cb.value);
            // Equipment is an array of objects: { id, name, status }
            const eqArray = Array.from(document.querySelectorAll('.eq-cb:checked')).map(cb => ({ id: cb.value, name: cb.dataset.name, status: 'pending' }));

            document.getElementById('btnSaveEvent').disabled = true;
            try {
                await addDoc(collection(db, "events"), { name: name, location: loc, assignedCrew: crewArray, equipment: eqArray, createdAt: serverTimestamp() });
                closeModal('addEventModal'); loadEvents();
            } catch (err) { console.error(err); alert("Error"); }
            document.getElementById('btnSaveEvent').disabled = false;
        };

        function openEventDetails(e) {
            activeEventId = e.id;
            document.getElementById('detailEventName').innerText = e.name;
            document.getElementById('detailEventLocation').innerHTML = `<i class="fas fa-map-marker-alt mr-2 text-orange-500/80"></i>${e.location}`;
            
            const crewDiv = document.getElementById('detailEventCrew'); crewDiv.innerHTML = "";
            if(e.assignedCrew && e.assignedCrew.length > 0) {
                e.assignedCrew.forEach(c => crewDiv.innerHTML += `<span class="bg-slate-800/80 text-slate-300 px-3 py-1.5 rounded-lg text-xs font-medium border border-slate-700 shadow-sm"><i class="fas fa-user text-orange-500/70 mr-2"></i>${c}</span>`);
            } else { crewDiv.innerHTML = '<span class="text-slate-500 text-xs italic">No crew assigned</span>'; }

            switchAdminView('eventDetailsView');
            loadEventShifts(e.id); loadEventTasks(e.id); loadMissingReports(e.id);
        }

        // --- Missing Gear Reports ---
        async function loadMissingReports(eventId) {
            const list = document.getElementById('eventMissingList'); list.innerHTML = '<div class="text-center py-4"><i class="fas fa-spinner fa-spin text-slate-500"></i></div>';
            try {
                const snap = await getDocs(query(collection(db, "missing_reports"), where("eventId", "==", eventId), orderBy("reportedAt", "desc")));
                list.innerHTML = "";
                if(snap.empty) { list.innerHTML = '<div class="text-slate-500 text-sm text-center">No missing gear reported.</div>'; return; }
                
                snap.forEach(d => {
                    const r = d.data();
                    const missingNames = r.missingItems.map(i => i.name).join(', ');
                    const dateStr = r.reportedAt ? new Date(r.reportedAt.toDate()).toLocaleString() : 'N/A';
                    list.innerHTML += `
                        <div class="bg-rose-500/10 border border-rose-500/30 rounded-xl p-4">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="font-bold text-rose-400 text-sm"><i class="fas fa-user-shield mr-1"></i> Reported by: ${r.reportedBy}</h4>
                                <span class="text-[9px] text-slate-400 bg-slate-900 px-2 py-1 rounded border border-slate-800">${dateStr}</span>
                            </div>
                            <p class="text-xs text-white leading-relaxed"><span class="text-rose-400/80 font-bold uppercase tracking-wider text-[10px] block mb-1">Missing Items:</span> ${missingNames}</p>
                        </div>`;
                });
            } catch(e) { console.error(e); list.innerHTML = '<div class="text-slate-500 text-sm">Failed to load reports.</div>'; }
        }

        // --- Shifts ---
        async function loadEventShifts(eventId) {
            const list = document.getElementById('eventShiftsList'); list.innerHTML = '<div class="text-center py-4"><i class="fas fa-spinner fa-spin text-slate-500"></i></div>';
            try {
                const snap = await getDocs(query(collection(db, "shift_logs"), where("eventId", "==", eventId), orderBy("timestamp", "desc")));
                list.innerHTML = "";
                if(snap.empty) { list.innerHTML = '<div class="text-slate-500 text-sm text-center bg-slate-900/50 p-4 border border-dashed border-slate-800 rounded-xl">No shift logs found</div>'; return; }

                snap.forEach(d => {
                    const log = d.data();
                    list.innerHTML += `
                        <div class="bg-slate-950/50 border border-slate-800 rounded-xl p-4 flex gap-4 transition hover:bg-slate-900">
                            <div class="flex flex-col gap-2 w-16">
                                <div class="relative w-16 h-16 rounded overflow-hidden cursor-pointer border border-slate-700 hover:border-emerald-500" onclick="viewImage('${log.setupPhoto}')"><img src="${log.setupPhoto}" class="w-full h-full object-cover"><div class="absolute bottom-0 w-full bg-slate-900/80 text-[8px] text-center font-bold text-white py-0.5">IN</div></div>
                                <div class="relative w-16 h-16 rounded overflow-hidden cursor-pointer border border-slate-700 hover:border-rose-500" onclick="viewImage('${log.packupPhoto}')"><img src="${log.packupPhoto}" class="w-full h-full object-cover"><div class="absolute bottom-0 w-full bg-slate-900/80 text-[8px] text-center font-bold text-white py-0.5">OUT</div></div>
                            </div>
                            <div class="flex-1 min-w-0">
                                <h4 class="font-bold text-white text-sm mb-1">${log.crewName}</h4>
                                <p class="text-[10px] text-slate-400 mb-2 font-mono">${new Date(log.startTime).toLocaleTimeString()} - ${new Date(log.endTime).toLocaleTimeString()}</p>
                                <div class="flex gap-2">
                                    <span class="bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-1 rounded text-[10px] font-bold"><i class="fas fa-hourglass-half mr-1"></i> ${log.hours}h</span>
                                    <span class="bg-slate-800 text-slate-300 border border-slate-700 px-2 py-1 rounded text-[10px] font-bold">LKR ${log.expenses || 0}</span>
                                </div>
                            </div>
                        </div>`;
                });
            } catch(e) { console.error(e); list.innerHTML = '<div class="text-rose-500 text-xs">Error loading logs</div>'; }
        }

        // --- Tasks ---
        function loadEventTasks(eventId) {
            const list = document.getElementById('eventTasksList');
            onSnapshot(collection(db, `events/${eventId}/deliverables`), (snap) => {
                let tasks = []; snap.forEach(d => tasks.push({id: d.id, ...d.data()}));
                tasks.sort((a,b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                
                list.innerHTML = "";
                if(tasks.length === 0) { list.innerHTML = '<div class="text-slate-500 text-sm text-center bg-slate-900/50 p-4 border border-dashed border-slate-800 rounded-xl">No tasks assigned</div>'; return; }

                tasks.forEach(t => {
                    let proofHtml = '';
                    if(t.status !== 'new') {
                        let links = t.submittedLink ? `<a href="${t.submittedLink}" target="_blank" class="text-blue-400 hover:text-blue-300 text-xs block mb-3 font-medium"><i class="fas fa-external-link-alt mr-1.5"></i>${t.submittedLink}</a>` : '';
                        let imgs = (t.photos || []).map(p => `<img src="${p}" onclick="viewImage('${p}')" class="w-12 h-12 object-cover rounded-lg cursor-pointer border border-slate-700 hover:border-orange-500 transition">`).join('');
                        
                        let actionBtn = t.status === 'pending_approval' 
                            ? `<button onclick="approveTask('${t.id}')" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white text-[10px] tracking-wider uppercase font-bold py-2.5 rounded-lg mt-3 shadow-lg transition">Approve Deliverable</button>`
                            : `<div class="mt-3 text-emerald-400 text-xs font-bold text-center bg-emerald-500/5 py-2 rounded-lg border border-emerald-500/20"><i class="fas fa-check-circle mr-1.5"></i> Approved</div>`;

                        proofHtml = `<div class="mt-4 p-4 bg-slate-950/50 rounded-xl border border-slate-800/80">
                                        <p class="text-[9px] text-slate-500 uppercase tracking-widest font-bold mb-3">Submitted Evidence</p>
                                        ${links}<div class="flex gap-2">${imgs}</div>${actionBtn}
                                     </div>`;
                    }

                    let statusUI = t.status === 'new' ? '<span class="text-[9px] bg-slate-800 text-slate-400 px-2 py-1 rounded uppercase tracking-wider font-bold">New</span>' :
                                   t.status === 'pending_approval' ? '<span class="text-[9px] bg-amber-500/10 text-amber-500 px-2 py-1 rounded border border-amber-500/20 uppercase tracking-wider font-bold">Review</span>' :
                                   '<span class="text-[9px] bg-emerald-500/10 text-emerald-500 px-2 py-1 rounded border border-emerald-500/20 uppercase tracking-wider font-bold">Done</span>';

                    list.innerHTML += `
                        <div class="glass-card rounded-xl p-5 shadow-sm border border-slate-800/50">
                            <div class="flex justify-between items-start mb-2"><h4 class="font-bold text-white text-sm pr-2">${t.title}</h4>${statusUI}</div>
                            <p class="text-xs text-slate-400 leading-relaxed">${t.description}</p>${proofHtml}
                        </div>`;
                });
            });
        }

        window.saveTask = async () => {
            const title = document.getElementById('newTaskTitle').value, desc = document.getElementById('newTaskDesc').value;
            if(!title || !activeEventId) return;
            try { await addDoc(collection(db, `events/${activeEventId}/deliverables`), { title, description: desc, status: 'new', createdAt: serverTimestamp() }); closeModal('addTaskModal'); } 
            catch(e) { console.error(e); }
        };

        window.approveTask = async (taskId) => {
            if(confirm("Approve this deliverable?")) {
                try { await updateDoc(doc(db, `events/${activeEventId}/deliverables/${taskId}`), { status: 'completed' }); } 
                catch(e) { console.error(e); }
            }
        }

        // --- Crew & Inventory Management ---
        async function loadCrew() {
            const grid = document.getElementById('crewGrid'); grid.innerHTML = '<div class="text-slate-500"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
            try {
                const snap = await getDocs(collection(db, "crew")); grid.innerHTML = "";
                if(snap.empty) { grid.innerHTML = '<div class="col-span-full text-slate-500 text-sm text-center">No crew members. Add one above.</div>'; return; }
                snap.forEach(d => {
                    const c = d.data();
                    grid.innerHTML += `<div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex items-center gap-4"><div class="w-12 h-12 rounded-full bg-blue-500/10 text-blue-500 flex items-center justify-center text-xl"><i class="fas fa-user-astronaut"></i></div><div><h4 class="text-white font-bold">${c.name}</h4><p class="text-xs text-slate-400">${c.role || 'Member'}</p></div></div>`;
                });
            } catch(e) { console.error(e); }
        }

        window.saveCrew = async () => {
            const name = document.getElementById('newCrewName').value, role = document.getElementById('newCrewRole').value;
            if(!name) return;
            try { await addDoc(collection(db, "crew"), { name, role, addedAt: serverTimestamp() }); closeModal('addCrewModal'); loadCrew(); } 
            catch(e) { console.error(e); }
        }

        // --- Inventory & QR Code Generation ---
        window.downloadQR = (id, name) => {
            const canvas = document.querySelector(`#qr-${id} canvas`);
            if(!canvas) return alert("QR Code not generated yet!");
            const link = document.createElement('a');
            link.download = `QR_${name}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        async function loadInventory() {
            const grid = document.getElementById('inventoryGrid'); grid.innerHTML = '<div class="text-slate-500"><i class="fas fa-spinner fa-spin"></i> Loading...</div>';
            try {
                const snap = await getDocs(collection(db, "inventory")); grid.innerHTML = "";
                if(snap.empty) { grid.innerHTML = '<div class="col-span-full text-slate-500 text-sm text-center">No gear listed. Add items above.</div>'; return; }
                
                let items = [];
                snap.forEach(d => items.push({id: d.id, ...d.data()}));
                
                items.forEach(i => {
                    grid.innerHTML += `
                        <div class="bg-slate-900 border border-slate-800 p-4 rounded-xl flex flex-col sm:flex-row items-center justify-between gap-4 shadow-sm hover:border-emerald-500/30 transition">
                            <div class="flex items-center gap-4 w-full sm:w-auto">
                                <div id="qr-${i.id}" class="w-14 h-14 bg-white p-1 rounded-lg flex-shrink-0 flex items-center justify-center"></div>
                                <div class="min-w-0 flex-1">
                                    <h4 class="text-white font-bold text-sm truncate pr-2">${i.name}</h4>
                                    <p class="text-[10px] text-slate-500 font-mono mt-1">${i.tag || 'NO-TAG'}</p>
                                </div>
                            </div>
                            <button onclick="downloadQR('${i.id}', '${i.name.replace(/[^a-z0-9]/gi, '_')}')" class="w-full sm:w-auto text-emerald-500 hover:text-emerald-400 px-4 py-2 sm:p-3 bg-emerald-500/10 hover:bg-emerald-500/20 rounded-lg transition text-xs sm:text-base font-bold flex items-center justify-center gap-2">
                                <i class="fas fa-download"></i> <span class="sm:hidden">Download QR</span>
                            </button>
                        </div>`;
                });

                // Render QR codes after DOM is updated
                items.forEach(i => {
                    const qrContainer = document.getElementById(`qr-${i.id}`);
                    if(qrContainer) {
                        new QRCode(qrContainer, {
                            text: i.id, // Using Firebase Doc ID as the QR data
                            width: 48,
                            height: 48,
                            colorDark : "#020617",
                            colorLight : "#ffffff",
                            correctLevel : QRCode.CorrectLevel.L
                        });
                    }
                });
            } catch(e) { console.error(e); }
        }

        window.saveInventory = async () => {
            const name = document.getElementById('newInvName').value, tag = document.getElementById('newInvTag').value;
            if(!name) return;
            try { 
                await addDoc(collection(db, "inventory"), { name, tag, addedAt: serverTimestamp() }); 
                closeModal('addInventoryModal'); 
                loadInventory(); 
            } 
            catch(e) { console.error(e); }
        }

        async function initializeAppAdmin() {
            try { await signInAnonymously(auth); } catch (e) { console.error("Auth init failed", e); }
            switchAdminView('dashboardView');
        }

        initializeAppAdmin();
    </script>
</body>
</html>
