<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hotmello Productions</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#020617"> <!-- Dark background -->

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); }
        input, select { font-size: 16px !important; }
        
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 h-screen flex flex-col">

    <!-- Header -->
    <div class="bg-slate-900/90 backdrop-blur-md p-4 shadow-lg sticky top-0 z-20 flex justify-between items-center border-b border-slate-800">
        <div class="flex flex-col justify-center">
            <!-- Logo replaced here -->
            <img src="logo.png" alt="Hotmello Productions" class="h-6 sm:h-8 object-contain drop-shadow-[0_0_8px_rgba(249,115,22,0.4)]">
            <p id="headerEventName" class="text-xs text-slate-400 hidden truncate max-w-[180px] mt-1">Loading...</p>
        </div>
        <div class="flex items-center gap-3">
            <button id="installAppBtn" class="hidden bg-orange-600 text-white text-[10px] font-bold px-3 py-1.5 rounded-full animate-pulse shadow-[0_0_10px_rgba(249,115,22,0.5)] transition">
                <i class="fas fa-download mr-1"></i> ඇප් එක ගන්න
            </button>
            
            <button id="switchEventBtn" onclick="resetEvent()" class="hidden text-[10px] bg-slate-800 border border-slate-700 px-3 py-1.5 rounded-md text-slate-300 active:bg-slate-700 transition">
                වෙනස් කරන්න
            </button>
            <div id="connectionStatus" class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></div>
        </div>
    </div>

    <!-- Main Tabs -->
    <div id="mainTabs" class="flex border-b border-slate-800 bg-slate-900 hidden">
        <button onclick="switchTab('shift')" id="tab-shift" class="flex-1 py-3 text-center text-orange-400 border-b-2 border-orange-500 font-bold transition text-xs uppercase tracking-widest active:bg-slate-800">
            <i class="fas fa-clock mr-1"></i> වැඩ මුරය
        </button>
        <button onclick="switchTab('tasks')" id="tab-tasks" class="flex-1 py-3 text-center text-slate-500 font-bold transition text-xs uppercase tracking-widest active:bg-slate-800">
            <i class="fas fa-tasks mr-1"></i> කාර්යයන්
        </button>
    </div>

    <!-- Content Area -->
    <div class="flex-1 overflow-y-auto p-4 pb-24 relative">
        
        <!-- Event Selection View -->
        <div id="eventSelectContainer" class="mt-8 px-2 animate-fade-in">
            <div class="text-center mb-8">
                <div class="w-24 h-24 bg-slate-900 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-800 shadow-[0_0_20px_rgba(249,115,22,0.15)] relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-full h-full bg-orange-500/10 rounded-full blur-xl pointer-events-none"></div>
                    <i class="fas fa-calendar-alt text-4xl text-orange-500 relative z-10"></i>
                </div>
                <h2 class="text-2xl font-bold text-white">ඉවෙන්ට් එක තෝරන්න</h2>
                <p class="text-slate-500 text-sm mt-2">අද දිනට අදාල ඉවෙන්ට් එක තෝරන්න.</p>
            </div>
            
            <div class="relative">
                <i class="fas fa-search absolute left-4 top-4 text-slate-500"></i>
                <input type="text" id="eventSearchInput" placeholder="ඉවෙන්ට් එක සොයන්න..." class="w-full bg-slate-900 pl-12 p-4 rounded-xl text-white border border-slate-800 focus:ring-2 focus:ring-orange-500 outline-none shadow-lg transition">
            </div>
            
            <div id="eventResultsList" class="mt-6 space-y-3 pb-10">
                <div class="text-center text-slate-500 text-sm mt-8"><i class="fas fa-spinner fa-spin mr-2"></i>ඉවෙන්ට්ස් පූරණය වෙමින්...</div>
            </div>
        </div>

        <!-- App Content View -->
        <div id="appContent" class="hidden mt-2">
            
            <!-- Tab 1: Shift & Setup Log -->
            <div id="shiftSection">
                <div class="glass-panel p-5 rounded-2xl shadow-2xl border border-slate-800 relative overflow-hidden">
                    <!-- Background Glow -->
                    <div class="absolute -top-10 -right-10 w-48 h-48 bg-orange-500/15 rounded-full blur-3xl pointer-events-none"></div>

                    <label class="text-[11px] text-orange-300 uppercase font-bold tracking-wider mb-2 block relative z-10">කණ්ඩායමේ සාමාජිකයා (Crew)</label>
                    <div class="relative mb-6 z-10">
                        <select id="crewSelect" class="w-full bg-slate-900 p-4 rounded-xl text-white text-base border border-slate-700 appearance-none focus:border-orange-500 outline-none shadow-inner">
                            <option value="">සාමාජිකයා තෝරන්න...</option>
                        </select>
                        <i class="fas fa-user-astronaut absolute right-4 top-4 text-slate-500 pointer-events-none text-lg"></i>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6 relative z-10">
                        <!-- Setup Photo -->
                        <div class="flex flex-col">
                            <label class="text-[10px] text-emerald-400 uppercase font-bold tracking-wider mb-2 block">Setup ඡායාරූපය</label>
                            <label id="startBox" class="w-full aspect-square border-2 border-dashed border-slate-700 rounded-xl flex flex-col items-center justify-center cursor-pointer active:bg-slate-800 bg-slate-900/50 relative overflow-hidden transition-all hover:border-emerald-500/50">
                                <input type="file" id="startCameraInput" accept="image/*" capture="environment" class="hidden" disabled>
                                <div id="startPlaceholder" class="flex flex-col items-center text-center p-2">
                                    <i class="fas fa-boxes text-3xl text-emerald-500 mb-2"></i>
                                    <span class="text-[11px] text-slate-400">පැමිණීම තහවුරු කරන්න</span>
                                </div>
                                <img id="startPreview" class="hidden absolute inset-0 w-full h-full object-cover">
                                <div id="startTimeBadge" class="hidden absolute bottom-0 left-0 right-0 bg-black/80 backdrop-blur text-white text-[10px] text-center py-1.5 font-bold"></div>
                            </label>
                        </div>

                        <!-- Pack-up Photo -->
                        <div class="flex flex-col">
                            <label class="text-[10px] text-rose-400 uppercase font-bold tracking-wider mb-2 block">Pack-up ඡායාරූපය</label>
                            <label id="endBox" class="w-full aspect-square border-2 border-dashed border-slate-700 rounded-xl flex flex-col items-center justify-center cursor-not-allowed bg-slate-900/50 relative overflow-hidden opacity-50 transition-all">
                                <input type="file" id="endCameraInput" accept="image/*" capture="environment" class="hidden" disabled>
                                <div id="endPlaceholder" class="flex flex-col items-center text-center p-2">
                                    <i class="fas fa-truck-loading text-3xl text-rose-500 mb-2"></i>
                                    <span class="text-[11px] text-slate-400">පිටවීම තහවුරු කරන්න</span>
                                </div>
                                <img id="endPreview" class="hidden absolute inset-0 w-full h-full object-cover">
                                <div id="endTimeBadge" class="hidden absolute bottom-0 left-0 right-0 bg-black/80 backdrop-blur text-white text-[10px] text-center py-1.5 font-bold"></div>
                            </label>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6 relative z-10">
                        <div>
                            <label class="text-[10px] text-orange-300 uppercase font-bold tracking-wider mb-2 block">වැඩ කළ පැය ගණන</label>
                            <input type="number" id="shiftHours" step="0.5" placeholder="0.0" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 font-bold text-center text-lg text-amber-400 focus:border-orange-500 outline-none shadow-inner">
                        </div>
                        <div>
                            <label class="text-[10px] text-orange-300 uppercase font-bold tracking-wider mb-2 block">අමතර වියදම් (රු.)</label>
                            <input type="number" id="shiftExpenses" placeholder="0" class="w-full bg-slate-900 p-3 rounded-xl border border-slate-700 font-bold text-center text-lg text-white focus:border-orange-500 outline-none shadow-inner">
                        </div>
                    </div>

                    <button id="resetLogBtn" onclick="clearShiftLog()" class="hidden w-full mb-4 bg-transparent border border-rose-900/50 text-rose-400 hover:bg-rose-900/20 py-2.5 rounded-xl text-xs font-bold uppercase transition relative z-10">
                        <i class="fas fa-undo-alt mr-1"></i> වාර්තාව මකා දමන්න
                    </button>

                    <button id="uploadBtn" disabled class="relative z-10 w-full bg-slate-800 text-slate-500 py-4 rounded-xl font-bold text-base transition shadow-lg disabled:cursor-not-allowed flex justify-center items-center gap-2 active:scale-[0.98]">
                        වාර්තාව යවන්න
                    </button>
                </div>
                
                <div class="mt-8">
                    <h3 class="text-[11px] font-bold text-slate-500 uppercase tracking-widest mb-4 ml-1 flex items-center gap-2"><i class="fas fa-history"></i> මෑත ඉතිහාසය</h3>
                    <div id="historyList" class="space-y-3 pb-10"></div>
                </div>
            </div>

            <!-- Tab 2: Deliverables / Tasks -->
            <div id="tasksSection" class="hidden">
                <div id="taskList" class="space-y-4 pb-10">
                    <div class="text-center py-10">
                        <i class="fas fa-spinner fa-spin text-orange-500 text-3xl"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Task Completion Modal -->
    <div id="taskModal" class="hidden fixed inset-0 z-50 bg-slate-950/95 backdrop-blur-md flex flex-col p-4 overflow-y-auto">
        <div class="flex justify-between items-center mb-6 border-b border-slate-800 pb-4 mt-4">
            <h2 class="text-xl font-black text-white flex items-center"><i class="fas fa-check-double text-emerald-500 mr-2"></i> කාර්යය සම්පූර්ණ කිරීම</h2>
            <button onclick="closeTaskModal()" class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center text-slate-400 hover:text-white active:bg-slate-800 transition shadow-lg"><i class="fas fa-times text-lg"></i></button>
        </div>
        
        <div class="bg-slate-900 p-5 rounded-2xl border border-slate-800 mb-6 shadow-inner relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-orange-500/10 rounded-full blur-3xl pointer-events-none"></div>
            <h3 id="modalTaskTitle" class="text-lg text-orange-400 font-bold mb-2 relative z-10">Task Name</h3>
            <p id="modalTaskDesc" class="text-sm text-slate-400 leading-relaxed relative z-10">Description...</p>
        </div>

        <label class="text-[11px] text-orange-300 uppercase font-bold tracking-wider mb-2 block">Drive/YouTube ලින්ක් එක (ඇත්නම්)</label>
        <input type="url" id="taskLink" class="w-full bg-slate-900 p-4 rounded-xl border border-slate-800 text-white text-sm mb-6 focus:ring-2 focus:ring-emerald-500 outline-none placeholder-slate-600" placeholder="https://drive.google.com/...">
        
        <label class="text-[11px] text-orange-300 uppercase font-bold tracking-wider mb-2 block">සාක්ෂි ඡායාරූප (උපරිම 3යි)</label>
        <div class="grid grid-cols-3 gap-3 mb-8">
            <div class="aspect-square bg-slate-900 rounded-xl border border-dashed border-slate-700 flex items-center justify-center cursor-pointer hover:border-orange-500 active:bg-slate-800 relative overflow-hidden transition" onclick="document.getElementById('taskImg1').click()">
                <input type="file" id="taskImg1" accept="image/*" class="hidden" onchange="previewTaskImg(this, 1)">
                <img id="prev1" class="hidden w-full h-full object-cover">
                <i id="icon1" class="fas fa-camera text-slate-600 text-2xl"></i>
            </div>
            <div class="aspect-square bg-slate-900 rounded-xl border border-dashed border-slate-700 flex items-center justify-center cursor-pointer hover:border-orange-500 active:bg-slate-800 relative overflow-hidden transition" onclick="document.getElementById('taskImg2').click()">
                <input type="file" id="taskImg2" accept="image/*" class="hidden" onchange="previewTaskImg(this, 2)">
                <img id="prev2" class="hidden w-full h-full object-cover">
                <i id="icon2" class="fas fa-plus text-slate-600 text-2xl"></i>
            </div>
            <div class="aspect-square bg-slate-900 rounded-xl border border-dashed border-slate-700 flex items-center justify-center cursor-pointer hover:border-orange-500 active:bg-slate-800 relative overflow-hidden transition" onclick="document.getElementById('taskImg3').click()">
                <input type="file" id="taskImg3" accept="image/*" class="hidden" onchange="previewTaskImg(this, 3)">
                <img id="prev3" class="hidden w-full h-full object-cover">
                <i id="icon3" class="fas fa-plus text-slate-600 text-2xl"></i>
            </div>
        </div>
        <button id="submitTaskBtn" onclick="submitTask()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-4 rounded-xl font-bold text-lg shadow-[0_4px_14px_0_rgba(16,185,129,0.39)] active:scale-[0.98] transition">
            තහවුරු කරන්න
        </button>
    </div>

    <!-- Custom Toast Notification -->
    <div id="toastMessage" class="fixed bottom-10 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl transition-all duration-300 z-[100] text-sm font-bold opacity-0 pointer-events-none flex items-center gap-2">
        <i id="toastIcon" class="fas fa-info-circle"></i> <span id="toastText">Message</span>
    </div>

    <!-- Custom Confirm Modal -->
    <div id="confirmModal" class="hidden fixed inset-0 z-[110] bg-black/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 p-6 rounded-2xl w-full max-w-xs shadow-2xl text-center">
            <div class="w-16 h-16 bg-slate-800 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-question text-3xl text-orange-500"></i>
            </div>
            <h3 class="text-lg font-bold text-white mb-2">තහවුරු කරන්න</h3>
            <p id="confirmMsg" class="text-sm text-slate-400 mb-6">ඔබට විශ්වාසද?</p>
            <div class="flex gap-3">
                <button onclick="confirmNo()" class="flex-1 py-3 bg-slate-800 text-white rounded-xl font-bold text-sm active:bg-slate-700">නැහැ</button>
                <button onclick="confirmYes()" class="flex-1 py-3 bg-orange-600 text-white rounded-xl font-bold text-sm shadow-lg active:bg-orange-700">ඔව්</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, onSnapshot, serverTimestamp, doc, updateDoc, limit } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        // Keep existing firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyAuPT3k3JPOPx2jMYelNAEKietV-OVAWOI",
            authDomain: "hotmellow-labs.firebaseapp.com",
            projectId: "hotmellow-labs",
            storageBucket: "hotmellow-labs.firebasestorage.app",
            messagingSenderId: "435268267101",
            appId: "1:435268267101:web:e8aefe8f7f20750dc831b4",
            measurementId: "G-LW4LDFLJB6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // --- Custom UI Alerts ---
        window.showToast = (msg, type = 'success') => {
            const toast = document.getElementById('toastMessage');
            document.getElementById('toastText').innerText = msg;
            const icon = document.getElementById('toastIcon');
            
            if (type === 'error') {
                toast.className = "fixed bottom-10 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl transition-all duration-300 z-[100] text-sm font-bold flex items-center gap-2 bg-rose-600 text-white";
                icon.className = "fas fa-exclamation-triangle";
            } else {
                toast.className = "fixed bottom-10 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-2xl transition-all duration-300 z-[100] text-sm font-bold flex items-center gap-2 bg-emerald-600 text-slate-900";
                icon.className = "fas fa-check-circle";
            }
            
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, -20px)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, 0)';
            }, 3000);
        };

        window.showConfirm = (msg) => {
            return new Promise(resolve => {
                const modal = document.getElementById('confirmModal');
                document.getElementById('confirmMsg').innerText = msg;
                modal.classList.remove('hidden');
                window.confirmYes = () => { modal.classList.add('hidden'); resolve(true); };
                window.confirmNo = () => { modal.classList.add('hidden'); resolve(false); };
            });
        };

        // --- PWA INSTALL LOGIC ---
        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');
        if (window.matchMedia('(display-mode: standalone)').matches) { installBtn.classList.add('hidden'); }
        window.addEventListener('beforeinstallprompt', (e) => { 
            e.preventDefault(); 
            deferredPrompt = e; 
            if (!window.matchMedia('(display-mode: standalone)').matches) { installBtn.classList.remove('hidden'); } 
        });
        installBtn.addEventListener('click', async () => { 
            if (deferredPrompt) { 
                deferredPrompt.prompt(); 
                const { outcome } = await deferredPrompt.userChoice; 
                if (outcome === 'accepted') { installBtn.classList.add('hidden'); } 
                deferredPrompt = null; 
            } 
        });

        // --- UI HELPERS ---
        window.switchTab = (tab) => {
            document.querySelectorAll('[id^="tab-"]').forEach(el => { 
                el.classList.replace('text-orange-400', 'text-slate-500'); 
                el.classList.remove('border-b-2', 'border-orange-500'); 
            });
            const active = document.getElementById(`tab-${tab}`); 
            active.classList.replace('text-slate-500', 'text-orange-400'); 
            active.classList.add('border-b-2', 'border-orange-500');
            document.getElementById('shiftSection').classList.toggle('hidden', tab !== 'shift');
            document.getElementById('tasksSection').classList.toggle('hidden', tab !== 'tasks');
        };

        window.resetEvent = async () => { 
            const confirmReset = await showConfirm("ඉවෙන්ට් එක මාරු කරන්න අවශ්‍යද?");
            if(confirmReset) { 
                localStorage.removeItem('site_event_id'); 
                localStorage.removeItem('site_event_name'); 
                location.reload(); 
            } 
        };

        // --- DATA LOADING ---
        const crewSelect = document.getElementById('crewSelect');
        const eventSearchInput = document.getElementById('eventSearchInput');
        const eventListDiv = document.getElementById('eventResultsList');
        let allEvents = [];
        let activeTaskId = null;

        async function initData() {
            try {
                await signInAnonymously(auth);
            } catch (authErr) {
                console.error("Auth init failed", authErr);
            }

            const lockedId = localStorage.getItem('site_event_id');
            const lockedName = localStorage.getItem('site_event_name');

            if(lockedId) {
                document.getElementById('eventSelectContainer').classList.add('hidden');
                document.getElementById('appContent').classList.remove('hidden');
                document.getElementById('mainTabs').classList.remove('hidden');
                document.getElementById('headerEventName').innerText = lockedName;
                document.getElementById('headerEventName').classList.remove('hidden');
                document.getElementById('switchEventBtn').classList.remove('hidden');
                loadEventData(lockedId);
            } else {
                try {
                    // Changed from 'projects' to 'events' collection
                    const q = query(collection(db, "events"), orderBy("name"));
                    const snapshot = await getDocs(q);
                    allEvents = [];
                    snapshot.forEach(doc => allEvents.push({id: doc.id, ...doc.data()}));
                    renderEventList(allEvents);
                } catch(e) { 
                    console.error("Event Load Error:", e); 
                    let errorMsg = 'ඉවෙන්ට් දත්ත ලබාගැනීමේ දෝෂයක්. කරුණාකර අන්තර්ජාල සබඳතාවය පරීක්ෂා කරන්න.';
                    if (e.message && e.message.includes('permission')) {
                        errorMsg = 'Permission Denied: කරුණාකර Firebase Firestore Rules "allow read, write: if true;" ලෙස සකසා Publish කර ඇති දැයි තහවුරු කරගන්න.';
                    }
                    eventListDiv.innerHTML = `<div class="text-rose-500 text-center text-sm bg-rose-500/10 p-4 rounded-xl border border-rose-500/20 shadow-lg"><i class="fas fa-exclamation-triangle mb-2 text-2xl"></i><br>${errorMsg}</div>`; 
                }
            }
        }
        setTimeout(initData, 500);

        eventSearchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const filtered = allEvents.filter(p => p.name.toLowerCase().includes(term));
            renderEventList(filtered);
        });

        function renderEventList(list) {
            eventListDiv.innerHTML = "";
            if(list.length === 0) { 
                eventListDiv.innerHTML = '<div class="text-slate-500 text-center text-sm p-4 border border-dashed border-slate-700 rounded-xl">ඉවෙන්ට් එකක් හමුවූයේ නැත.</div>'; 
                return; 
            }
            list.forEach(p => {
                const el = document.createElement('div');
                el.className = "bg-slate-900 p-5 rounded-2xl border border-slate-800 flex justify-between items-center active:bg-slate-800 hover:border-orange-500/50 transition cursor-pointer shadow-sm";
                el.onclick = () => selectEvent(p.id, p.name);
                el.innerHTML = `<div><h4 class="text-white font-bold text-lg">${p.name}</h4><p class="text-xs text-orange-400 mt-1"><i class="fas fa-map-marker-alt mr-1"></i>${p.location || 'Location N/A'}</p></div><div class="w-8 h-8 rounded-full bg-slate-800 flex items-center justify-center"><i class="fas fa-chevron-right text-slate-400"></i></div>`;
                eventListDiv.appendChild(el);
            });
        }

        async function selectEvent(eid, ename) {
            const confirmSelection = await showConfirm(`${ename} තෝරන්න අවශ්‍යද?`);
            if(confirmSelection) {
                localStorage.setItem('site_event_id', eid);
                localStorage.setItem('site_event_name', ename);
                location.reload();
            }
        }

        async function loadEventData(eid) {
            try {
                // Read from 'events' collection
                onSnapshot(doc(db, "events", eid), (docSnap) => {
                    if (docSnap.exists()) {
                        const crew = docSnap.data().assignedCrew || [];
                        const currentVal = crewSelect.value;
                        crewSelect.innerHTML = '<option value="">සාමාජිකයා තෝරන්න...</option>';
                        crew.forEach(c => {
                            const opt = document.createElement('option'); opt.value = c; opt.text = c;
                            crewSelect.appendChild(opt);
                        });
                        if(currentVal) crewSelect.value = currentVal;
                    }
                });
                loadShiftHistory(eid);
                loadTasks(eid);
            } catch(e) { console.error("Data Load Error", e); }
        }

        // --- STATE MANAGEMENT ---
        function getActiveLogs() {
            return JSON.parse(localStorage.getItem('site_active_logs') || '{}');
        }
        
        function saveLogState(crewName, data) {
            let logs = getActiveLogs();
            logs[crewName] = data;
            localStorage.setItem('site_active_logs', JSON.stringify(logs));
        }
        
        function removeLogState(crewName) {
            let logs = getActiveLogs();
            delete logs[crewName];
            localStorage.setItem('site_active_logs', JSON.stringify(logs));
        }

        let currentStartImg = null;
        let currentEndImg = null;
        let currentStartTime = null;
        let currentEndTime = null;

        crewSelect.addEventListener('change', () => {
            updateUIForCrew();
        });

        function updateUIForCrew() {
            const cName = crewSelect.value;
            const startBox = document.getElementById('startBox');
            const endBox = document.getElementById('endBox');
            const startInput = document.getElementById('startCameraInput');
            const endInput = document.getElementById('endCameraInput');
            const resetBtn = document.getElementById('resetLogBtn');
            const uploadBtn = document.getElementById('uploadBtn');
            
            document.getElementById('startPreview').classList.add('hidden');
            document.getElementById('startPlaceholder').classList.remove('hidden');
            document.getElementById('startTimeBadge').classList.add('hidden');
            startBox.classList.remove('border-emerald-500');
            
            document.getElementById('endPreview').classList.add('hidden');
            document.getElementById('endPlaceholder').classList.remove('hidden');
            document.getElementById('endTimeBadge').classList.add('hidden');
            endBox.classList.remove('border-rose-500');
            endBox.classList.add('opacity-50', 'cursor-not-allowed');
            
            document.getElementById('shiftHours').value = "";
            currentStartImg = null; currentEndImg = null; currentStartTime = null; currentEndTime = null;
            
            if(!cName) {
                startInput.disabled = true; endInput.disabled = true;
                return;
            }

            const logs = getActiveLogs();
            const logData = logs[cName];

            if(logData) {
                currentStartTime = new Date(logData.startTime);
                currentStartImg = logData.startImg;
                
                document.getElementById('startPreview').src = currentStartImg;
                document.getElementById('startPreview').classList.remove('hidden');
                document.getElementById('startPlaceholder').classList.add('hidden');
                document.getElementById('startTimeBadge').innerText = currentStartTime.toLocaleTimeString();
                document.getElementById('startTimeBadge').classList.remove('hidden');
                startBox.classList.add('border-emerald-500');
                
                startInput.disabled = true;
                endInput.disabled = false;
                endBox.classList.remove('opacity-50', 'cursor-not-allowed');
                resetBtn.classList.remove('hidden');
            } else {
                startInput.disabled = false;
                endInput.disabled = true;
                resetBtn.classList.add('hidden');
            }
            
            uploadBtn.disabled = true;
            uploadBtn.classList.replace('bg-orange-600', 'bg-slate-800');
            uploadBtn.classList.replace('text-white', 'text-slate-500');
            uploadBtn.innerHTML = "වාර්තාව යවන්න";
        }

        document.getElementById('startCameraInput').addEventListener('change', async (e) => {
            const cName = crewSelect.value;
            if(!cName) return;
            if(e.target.files[0]) {
                const file = e.target.files[0];
                const b64 = await processImage(file);
                const time = new Date().getTime();
                saveLogState(cName, { startTime: time, startImg: b64 });
                updateUIForCrew();
                showToast('පැමිණීම සටහන් කරගන්නා ලදී');
            }
        });

        document.getElementById('endCameraInput').addEventListener('change', async (e) => {
            if(e.target.files[0]) {
                const file = e.target.files[0];
                currentEndImg = await processImage(file);
                currentEndTime = new Date();
                
                document.getElementById('endPreview').src = currentEndImg;
                document.getElementById('endPreview').classList.remove('hidden');
                document.getElementById('endPlaceholder').classList.add('hidden');
                document.getElementById('endTimeBadge').innerText = currentEndTime.toLocaleTimeString();
                document.getElementById('endTimeBadge').classList.remove('hidden');
                document.getElementById('endBox').classList.add('border-rose-500');

                const diffMs = currentEndTime - currentStartTime;
                const hours = diffMs / (1000 * 60 * 60);
                document.getElementById('shiftHours').value = hours.toFixed(1);

                const btn = document.getElementById('uploadBtn');
                btn.disabled = false; 
                btn.classList.replace('bg-slate-800', 'bg-orange-600'); 
                btn.classList.replace('text-slate-500', 'text-white');
                showToast('පිටවීම සටහන් කරගන්නා ලදී');
            }
        });

        window.clearShiftLog = async () => {
            const cName = crewSelect.value;
            const confirmed = await showConfirm(`මෙම වාර්තාව මකා දැමීමට අවශ්‍යද?`);
            if(confirmed) {
                removeLogState(cName);
                updateUIForCrew();
            }
        }

        document.getElementById('uploadBtn').addEventListener('click', async () => {
            const btn = document.getElementById('uploadBtn');
            const eid = localStorage.getItem('site_event_id');
            const ename = localStorage.getItem('site_event_name');
            const cName = crewSelect.value;
            const hours = document.getElementById('shiftHours').value;
            const expenses = document.getElementById('shiftExpenses').value;
            
            if(!cName || !currentStartImg || !currentEndImg || !hours) {
                return showToast("කරුණාකර සියලුම දත්ත ඇතුලත් කරන්න", "error");
            }
            
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i> යවමින් පවතී...'; btn.disabled = true;
            try {
                // Save to 'shift_logs' collection instead of 'meter_readings'
                await addDoc(collection(db, "shift_logs"), {
                    eventId: eid, 
                    eventName: ename, 
                    crewName: cName,
                    setupPhoto: currentStartImg,
                    packupPhoto: currentEndImg,
                    startTime: currentStartTime,
                    endTime: currentEndTime,
                    timestamp: serverTimestamp(), 
                    status: "pending",
                    hours: parseFloat(hours), 
                    expenses: expenses ? parseFloat(expenses) : 0
                });
                
                removeLogState(cName);
                showToast("සාර්ථකව වාර්තාව යවන ලදී!"); 
                updateUIForCrew();
            } catch(e) { 
                console.error(e); 
                showToast("දෝෂයක් සිදුවිය!", "error"); 
                btn.disabled = false; 
                btn.innerHTML = "වාර්තාව යවන්න"; 
            }
        });

        function loadShiftHistory(eid) {
            onSnapshot(query(collection(db, "shift_logs"), where("eventId", "==", eid), orderBy("timestamp", "desc"), limit(10)), (snap) => {
                const list = document.getElementById('historyList'); list.innerHTML = "";
                snap.forEach(d => {
                    const data = d.data();
                    const statusColor = data.status === 'approved' ? 'text-emerald-400 border-emerald-500/50 bg-emerald-500/10' : 'text-amber-400 border-amber-500/50 bg-amber-500/10';
                    const icon = data.status === 'approved' ? 'fa-check-circle' : 'fa-clock';
                    list.innerHTML += `
                    <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 flex gap-4 items-center shadow-sm">
                        <div class="relative w-16 h-16 rounded-lg overflow-hidden border border-slate-700 flex-shrink-0">
                            <img src="${data.setupPhoto}" class="w-full h-full object-cover">
                            <div class="absolute bottom-0 w-full bg-black/60 text-[8px] text-center text-white py-0.5">SETUP</div>
                        </div>
                        <div class="flex-1 min-w-0">
                            <div class="flex justify-between items-start mb-1">
                                <h4 class="font-bold text-white text-sm truncate pr-2">${data.crewName}</h4>
                                <span class="text-[9px] border px-2 py-0.5 rounded-md uppercase font-bold flex items-center gap-1 whitespace-nowrap ${statusColor}">
                                    <i class="fas ${icon}"></i> ${data.status}
                                </span>
                            </div>
                            <div class="flex justify-between items-center text-xs text-slate-400">
                                <span class="bg-slate-800 px-2 py-1 rounded text-orange-300"><i class="fas fa-hourglass-half text-[10px]"></i> ${data.hours}h</span>
                                <span class="font-bold text-slate-300 border-b border-slate-700 border-dashed">වියදම්: රු.${data.expenses ? data.expenses.toLocaleString() : '0'}</span>
                            </div>
                        </div>
                    </div>`;
                });
            });
        }

        // --- TASKS / DELIVERABLES SECTION ---
        function loadTasks(eid) {
            onSnapshot(query(collection(db, `events/${eid}/deliverables`), orderBy("createdAt", "desc")), (snap) => {
                const list = document.getElementById('taskList'); list.innerHTML = "";
                if(snap.empty) { 
                    list.innerHTML = "<div class='text-center text-slate-600 py-16'><i class='fas fa-clipboard-check text-5xl mb-4 opacity-20'></i><p class='text-sm'>ලබා දී ඇති කාර්යයන් නොමැත.</p></div>"; 
                    return; 
                }
                snap.forEach(d => {
                    const t = d.data();
                    const status = t.status || 'new'; 
                    let btnHTML = "";
                    
                    if(status === 'new') {
                        btnHTML = `<button onclick="openTaskModal('${d.id}', '${t.title}', '${t.description}')" class="w-full mt-4 py-3 rounded-xl font-bold text-sm bg-orange-600 text-white active:bg-orange-700 shadow-lg shadow-orange-900/30 transition hover:bg-orange-500 flex justify-center items-center gap-2">සම්පූර්ණ කරන්න <i class="fas fa-arrow-right"></i></button>`;
                    } else if (status === 'pending_approval') {
                        btnHTML = `<div class="mt-4 bg-amber-500/10 border border-amber-500/30 p-3 rounded-xl text-center text-amber-400 text-xs font-bold uppercase tracking-wider"><i class="fas fa-spinner fa-spin mr-2"></i>අනුමත වනතුරු රැඳීසිටී</div>`;
                    } else if (status === 'completed') {
                        btnHTML = `<div class="mt-4 bg-emerald-500/10 border border-emerald-500/30 p-3 rounded-xl text-center text-emerald-400 text-xs font-bold uppercase tracking-wider"><i class="fas fa-check-double mr-2"></i>සාර්ථකයි</div>`;
                    }
                    
                    const el = document.createElement('div');
                    el.className = "bg-slate-900 p-5 rounded-2xl border border-slate-800 relative overflow-hidden shadow-sm";
                    if(status === 'completed') el.classList.add('opacity-50');
                    
                    el.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg text-slate-100">${t.title}</h3>
                        ${status === 'completed' ? '<i class="fas fa-check-circle text-emerald-500 text-xl shadow-[0_0_10px_rgba(16,185,129,0.5)] rounded-full"></i>' : '<i class="fas fa-tasks text-slate-700 text-xl"></i>'}
                    </div>
                    <p class="text-sm text-slate-400 leading-relaxed">${t.description || 'විස්තර ලබා දී නොමැත.'}</p>
                    ${btnHTML}`;
                    
                    list.appendChild(el);
                });
            });
        }

        window.openTaskModal = (tid, title, desc) => {
            activeTaskId = tid;
            document.getElementById('modalTaskTitle').innerText = title;
            document.getElementById('modalTaskDesc').innerText = desc;
            document.getElementById('taskModal').classList.remove('hidden');
            document.getElementById('taskLink').value = "";
            ['1','2','3'].forEach(i => {
                document.getElementById(`prev${i}`).classList.add('hidden');
                document.getElementById(`icon${i}`).classList.remove('hidden');
                document.getElementById(`taskImg${i}`).value = "";
                delete document.getElementById(`taskImg${i}`).dataset.b64;
            });
        };
        
        window.closeTaskModal = () => document.getElementById('taskModal').classList.add('hidden');

        window.previewTaskImg = async (input, idx) => {
            if(input.files[0]) {
                const b64 = await processImage(input.files[0]);
                document.getElementById(`prev${idx}`).src = b64;
                document.getElementById(`prev${idx}`).classList.remove('hidden');
                document.getElementById(`icon${idx}`).classList.add('hidden');
                input.dataset.b64 = b64; 
            }
        };

        window.submitTask = async () => {
            const link = document.getElementById('taskLink').value;
            const photos = [];
            if(document.getElementById('taskImg1').dataset.b64) photos.push(document.getElementById('taskImg1').dataset.b64);
            if(document.getElementById('taskImg2').dataset.b64) photos.push(document.getElementById('taskImg2').dataset.b64);
            if(document.getElementById('taskImg3').dataset.b64) photos.push(document.getElementById('taskImg3').dataset.b64);
            
            if(!link && photos.length === 0) return showToast("කරුණාකර ලින්ක් එකක් හෝ ඡායාරූපයක් ඇතුලත් කරන්න.", "error");
            
            const btn = document.getElementById('submitTaskBtn');
            btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> යවමින් පවතී..."; btn.disabled = true;
            try {
                const eid = localStorage.getItem('site_event_id');
                // Save task completion info
                await updateDoc(doc(db, `events/${eid}/deliverables/${activeTaskId}`), {
                    status: 'pending_approval', 
                    submittedLink: link, 
                    photos: photos, 
                    submittedAt: serverTimestamp()
                });
                showToast("සාර්ථකව යවන ලදී!");
                closeTaskModal();
            } catch(e) { 
                console.error(e); 
                showToast("දෝෂයක් සිදුවිය!", "error"); 
            }
            btn.innerHTML = "තහවුරු කරන්න"; btn.disabled = false;
        };

        // --- IMAGE COMPRESSION ---
        function processImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const ctx = canvas.getContext('2d');
                        const maxW = 800; const scale = maxW / img.width;
                        canvas.width = maxW; canvas.height = img.height * scale;
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.6));
                    };
                };
            });
        }
    </script>
</body>
</html>
